  <text x="200" y="445" font-family="Georgia, serif" font-size="18" fill="#5D3A3A" text-anchor="middle" font-style="italic">Sofia Moretti</text>
  <text x="200" y="470" font-family="sans-serif" font-size="13" fill="#9E6B6B" text-anchor="middle">Pasticcera Artigianale</text>
