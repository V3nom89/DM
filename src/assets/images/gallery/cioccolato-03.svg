<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#FFF8E1"/>
  <!-- White chocolate bark base -->
  <path d="M60,80 L340,70 L350,220 L55,230 Z" fill="#FFF9C4" stroke="#F9A825" stroke-width="1.5"/>
  <!-- Crack lines -->
  <path d="M60,80 L170,110 L180,230" stroke="#F9A825" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M170,110 L280,90 L350,220" stroke="#F9A825" stroke-width="1.5" fill="none" opacity="0.4"/>
  <!-- Red berries -->
  <circle cx="100" cy="120" r="10" fill="#E53935"/>
  <circle cx="130" cy="100" r="8" fill="#C62828"/>
  <circle cx="155" cy="130" r="9" fill="#E53935"/>
  <circle cx="200" cy="105" r="7" fill="#C62828"/>
  <circle cx="230" cy="125" r="10" fill="#E53935"/>
  <circle cx="260" cy="100" r="8" fill="#C62828"/>
  <circle cx="285" cy="130" r="9" fill="#E53935"/>
  <!-- Pistachios (green) -->
  <ellipse cx="118" cy="155" rx="10" ry="7" fill="#66BB6A" transform="rotate(-20 118 155)"/>
  <ellipse cx="175" cy="165" rx="10" ry="7" fill="#43A047" transform="rotate(15 175 165)"/>
  <ellipse cx="215" cy="150" rx="10" ry="7" fill="#66BB6A" transform="rotate(-10 215 150)"/>
  <ellipse cx="265" cy="160" rx="10" ry="7" fill="#43A047" transform="rotate(20 265 160)"/>
  <ellipse cx="310" cy="145" rx="10" ry="7" fill="#66BB6A" transform="rotate(-5 310 145)"/>
  <!-- Dried raspberries -->
  <circle cx="140" cy="185" r="7" fill="#AD1457" opacity="0.8"/>
  <circle cx="250" cy="190" r="7" fill="#AD1457" opacity="0.8"/>
  <circle cx="190" cy="195" r="6" fill="#C2185B" opacity="0.8"/>
  <text x="200" y="260" font-family="Georgia, serif" font-size="15" fill="#5D3A3A" text-anchor="middle" font-style="italic">Bark al Cioccolato</text>
  <text x="200" y="280" font-family="sans-serif" font-size="11" fill="#9E6B6B" text-anchor="middle">Foto in arrivo ✦</text>
</svg>
