<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#F5E6BE"/>
  <!-- 5-tier wedding cake -->
  <rect x="145" y="210" width="110" height="40" rx="6" fill="#FFFAFC" stroke="#C8A951" stroke-width="1.5"/>
  <rect x="155" y="175" width="90" height="38" rx="6" fill="#FFFAFC" stroke="#C8A951" stroke-width="1.5"/>
  <rect x="165" y="143" width="70" height="35" rx="6" fill="#FFFAFC" stroke="#C8A951" stroke-width="1.5"/>
  <rect x="175" y="115" width="50" height="31" rx="6" fill="#FFFAFC" stroke="#C8A951" stroke-width="1.5"/>
  <rect x="183" y="92" width="34" height="26" rx="6" fill="#FFFAFC" stroke="#C8A951" stroke-width="1.5"/>
  <!-- Gold accents -->
  <line x1="145" y1="225" x2="255" y2="225" stroke="#C8A951" stroke-width="1" opacity="0.5"/>
  <line x1="155" y1="190" x2="245" y2="190" stroke="#C8A951" stroke-width="1" opacity="0.5"/>
  <!-- Topper -->
  <circle cx="200" cy="86" r="6" fill="#C8A951"/>
  <line x1="200" y1="80" x2="200" y2="60" stroke="#C8A951" stroke-width="1.5"/>
  <circle cx="200" cy="55" r="8" fill="none" stroke="#C8A951" stroke-width="1.5"/>
  <text x="200" y="258" font-family="Georgia, serif" font-size="15" fill="#5D3A3A" text-anchor="middle" font-style="italic">Torta Matrimonio</text>
  <text x="200" y="278" font-family="sans-serif" font-size="11" fill="#9E6B6B" text-anchor="middle">Foto in arrivo ✦</text>
</svg>
